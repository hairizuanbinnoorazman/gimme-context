openapi: 3.1.0
info:
  title: Gimme Context API
  version: 0.1.0
  description: Versioned HTTP contract for the Gimme Context platform.
servers:
  - url: /api/v1
paths:
  /:
    get:
      operationId: getService
      responses:
        "200":
          description: API service information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceInfo"
  /health/live:
    get:
      servers:
        - url: /
      operationId: getLiveness
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /health/ready:
    get:
      servers:
        - url: /
      operationId: getReadiness
      responses:
        "200":
          description: Process can serve requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: Process is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /workspaces/{workspaceId}/incidents:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      operationId: listIncidents
      responses:
        "200":
          description: Workspace incidents, newest first
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Incident" }
    post:
      operationId: createIncident
      parameters:
        - $ref: "#/components/parameters/PrincipalId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateIncident" }
      responses:
        "201":
          description: Incident created with the caller as owner
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Incident" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /workspaces/{workspaceId}/incidents/{incidentId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/IncidentId"
    get:
      operationId: getIncident
      responses:
        "200":
          description: Incident detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Incident" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateIncident
      parameters:
        - $ref: "#/components/parameters/PrincipalId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateIncident" }
      responses:
        "200":
          description: Incident updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Incident" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /workspaces/{workspaceId}/incidents/{incidentId}/posts:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/IncidentId"
    get:
      operationId: getIncidentFeed
      responses:
        "200":
          description: Canonical chronological incident feed
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Post" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createPost
      parameters:
        - $ref: "#/components/parameters/PrincipalId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePost" }
      responses:
        "201":
          description: Post appended to the feed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /workspaces/{workspaceId}/incidents/{incidentId}/posts/{postId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/IncidentId"
      - name: postId
        in: path
        required: true
        schema: { type: string }
    put:
      operationId: revisePost
      parameters:
        - $ref: "#/components/parameters/PrincipalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blocks]
              properties:
                blocks:
                  type: array
                  minItems: 1
                  items: { $ref: "#/components/schemas/BlockInput" }
      responses:
        "200":
          description: New current revision
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /workspaces/{workspaceId}/incidents/{incidentId}/resolution:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/IncidentId"
    patch:
      operationId: updateIncidentResolution
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateResolution" }
      responses:
        "200":
          description: Verified summary or closure checklist updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Incident" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /workspaces/{workspaceId}/incidents/{incidentId}/facts:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/IncidentId"
    get:
      operationId: listFacts
      responses:
        "200":
          description: Structured incident facts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Fact" } }
    post:
      operationId: proposeFact
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProposeFact" }
      responses:
        "201":
          description: Fact proposed as unverified
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fact" }
  /workspaces/{workspaceId}/incidents/{incidentId}/facts/{factId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/IncidentId"
      - { name: factId, in: path, required: true, schema: { type: string } }
    patch:
      operationId: setFactState
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state: { $ref: "#/components/schemas/FactState" }
      responses:
        "200":
          description: Fact state updated by the incident owner
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fact" }
  /workspaces/{workspaceId}/incidents/{incidentId}/decisions:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/IncidentId"
    get:
      operationId: listDecisions
      responses:
        "200":
          description: Structured incident decisions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Decision" } }
    post:
      operationId: proposeDecision
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProposeDecision" }
      responses:
        "201":
          description: Decision proposed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Decision" }
  /workspaces/{workspaceId}/incidents/{incidentId}/decisions/{decisionId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/IncidentId"
      - { name: decisionId, in: path, required: true, schema: { type: string } }
    patch:
      operationId: decideDecision
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [accepted, rejected] }
      responses:
        "200":
          description: Proposed decision accepted or rejected by the incident owner
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Decision" }
        "409": { $ref: "#/components/responses/Conflict" }
  /workspaces/{workspaceId}/incidents/{incidentId}/actions:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/IncidentId" }]
    get:
      operationId: listActions
      responses:
        "200":
          description: Structured incident actions
          content: { application/json: { schema: { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Action" } } } } } }
    post:
      operationId: createAction
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateAction" } } } }
      responses:
        "201": { description: Owned action created, content: { application/json: { schema: { $ref: "#/components/schemas/Action" } } } }
  /workspaces/{workspaceId}/incidents/{incidentId}/actions/{actionId}:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/IncidentId" }, { name: actionId, in: path, required: true, schema: { type: string } }]
    patch:
      operationId: updateActionStatus
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [status], properties: { status: { $ref: "#/components/schemas/ActionStatus" } } } } } }
      responses:
        "200": { description: Action status updated, content: { application/json: { schema: { $ref: "#/components/schemas/Action" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /workspaces/{workspaceId}/incidents/{incidentId}/polls:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/IncidentId" }]
    get:
      operationId: listPolls
      responses:
        "200": { description: Incident polls, content: { application/json: { schema: { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Poll" } } } } } } }
    post:
      operationId: createPoll
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePoll" } } } }
      responses:
        "201": { description: Poll created, content: { application/json: { schema: { $ref: "#/components/schemas/Poll" } } } }
  /workspaces/{workspaceId}/incidents/{incidentId}/polls/{pollId}/votes:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/IncidentId" }, { name: pollId, in: path, required: true, schema: { type: string } }]
    post:
      operationId: castVote
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [optionId], properties: { optionId: { type: string } } } } } }
      responses:
        "200": { description: Vote recorded, content: { application/json: { schema: { $ref: "#/components/schemas/Poll" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /workspaces/{workspaceId}/incidents/{incidentId}/approvals:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/IncidentId" }]
    get:
      operationId: listApprovals
      responses:
        "200": { description: Incident approvals, content: { application/json: { schema: { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/Approval" } } } } } } }
    post:
      operationId: requestApproval
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/RequestApproval" } } } }
      responses:
        "201": { description: Approval bound to the current action specification, content: { application/json: { schema: { $ref: "#/components/schemas/Approval" } } } }
  /workspaces/{workspaceId}/incidents/{incidentId}/approvals/{approvalId}/responses:
    parameters: [{ $ref: "#/components/parameters/WorkspaceId" }, { $ref: "#/components/parameters/IncidentId" }, { name: approvalId, in: path, required: true, schema: { type: string } }]
    post:
      operationId: respondToApproval
      parameters: [{ $ref: "#/components/parameters/PrincipalId" }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [decision], properties: { decision: { type: string, enum: [approve, reject] } } } } } }
      responses:
        "200": { description: Approval response recorded, content: { application/json: { schema: { $ref: "#/components/schemas/Approval" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
components:
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema: { type: string }
    IncidentId:
      name: incidentId
      in: path
      required: true
      schema: { type: string }
    PrincipalId:
      name: X-Principal-ID
      in: header
      required: true
      description: Temporary development identity boundary; replaced by verified OIDC claims.
      schema: { type: string }
  responses:
    BadRequest:
      description: Malformed or invalid command
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Caller cannot perform the command
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource is absent or outside the workspace
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Command conflicts with current state
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
    ServiceInfo:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
        version:
          type: string
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    CreateIncident:
      type: object
      required: [title, severity]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        severity: { $ref: "#/components/schemas/Severity" }
        scope:
          type: array
          items: { type: string }
    UpdateIncident:
      type: object
      properties:
        lifecycle: { $ref: "#/components/schemas/Lifecycle" }
        severity: { $ref: "#/components/schemas/Severity" }
        ownerId: { type: string }
    Incident:
      type: object
      required: [id, workspaceId, title, ownerId, severity, lifecycle, scope, closureChecklist, createdAt, updatedAt]
      properties:
        id: { type: string }
        workspaceId: { type: string }
        title: { type: string }
        description: { type: string }
        ownerId: { type: string }
        severity: { $ref: "#/components/schemas/Severity" }
        lifecycle: { $ref: "#/components/schemas/Lifecycle" }
        scope:
          type: array
          items: { type: string }
        verifiedSummary: { type: string }
        closureChecklist:
          type: array
          items: { $ref: "#/components/schemas/ChecklistItem" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Severity:
      type: string
      enum: [unclassified, SEV-1, SEV-2, SEV-3, SEV-4]
    Lifecycle:
      type: string
      enum: [open, investigating, mitigating, monitoring, resolved, reviewed, archived, dormant, cancelled]
    ChecklistItem:
      type: object
      required: [id, label, completed]
      properties:
        id: { type: string }
        label: { type: string }
        completed: { type: boolean }
    UpdateResolution:
      type: object
      description: Set a verified summary, update one checklist item, or both.
      properties:
        verifiedSummary: { type: string }
        checklistItemId: { type: string }
        completed: { type: boolean }
    FactState:
      type: string
      enum: [unverified, corroborated, disputed, superseded, invalidated]
    ProposeFact:
      type: object
      required: [statement]
      properties:
        statement: { type: string, minLength: 1 }
        evidenceBlockIds: { type: array, items: { type: string } }
    Fact:
      type: object
      required: [id, workspaceId, incidentId, statement, state, evidenceBlockIds, proposedBy, updatedBy, createdAt, updatedAt]
      properties:
        id: { type: string }
        workspaceId: { type: string }
        incidentId: { type: string }
        statement: { type: string }
        state: { $ref: "#/components/schemas/FactState" }
        evidenceBlockIds: { type: array, items: { type: string } }
        proposedBy: { type: string }
        updatedBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ProposeDecision:
      type: object
      required: [statement]
      properties:
        statement: { type: string, minLength: 1 }
        rationale: { type: string }
        evidenceBlockIds: { type: array, items: { type: string } }
    Decision:
      type: object
      required: [id, workspaceId, incidentId, statement, rationale, status, evidenceBlockIds, proposedBy, createdAt, updatedAt]
      properties:
        id: { type: string }
        workspaceId: { type: string }
        incidentId: { type: string }
        statement: { type: string }
        rationale: { type: string }
        status: { type: string, enum: [proposed, accepted, rejected] }
        evidenceBlockIds: { type: array, items: { type: string } }
        proposedBy: { type: string }
        decidedBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ActionStatus:
      type: string
      enum: [proposed, ready, in-progress, blocked, verification, completed, failed, cancelled]
    ActionSpecification:
      type: object
      required: [kind, parameters]
      properties:
        kind: { type: string, minLength: 1 }
        parameters: { type: object, additionalProperties: true }
    CreateAction:
      type: object
      required: [title, ownerId, kind, parameters]
      properties:
        title: { type: string, minLength: 1 }
        ownerId: { type: string, minLength: 1 }
        kind: { type: string, minLength: 1 }
        parameters: { type: object, additionalProperties: true }
        verificationCriteria: { type: string }
    Action:
      type: object
      required: [id, workspaceId, incidentId, title, ownerId, status, specification, specificationHash, createdBy, createdAt, updatedAt]
      properties:
        id: { type: string }
        workspaceId: { type: string }
        incidentId: { type: string }
        title: { type: string }
        ownerId: { type: string }
        status: { $ref: "#/components/schemas/ActionStatus" }
        specification: { $ref: "#/components/schemas/ActionSpecification" }
        specificationHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        verificationCriteria: { type: string }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreatePoll:
      type: object
      required: [question, mode, options, eligibleVoterIds, quorum]
      properties:
        question: { type: string, minLength: 1 }
        mode: { type: string, enum: [advisory, binding] }
        options: { type: array, minItems: 2, items: { type: string, minLength: 1 } }
        eligibleVoterIds: { type: array, minItems: 1, uniqueItems: true, items: { type: string } }
        quorum: { type: integer, minimum: 1 }
        allowVoteChanges: { type: boolean, default: false }
    Poll:
      type: object
      required: [id, workspaceId, incidentId, question, mode, options, eligibleVoterIds, quorum, allowVoteChanges, votes, createdBy, createdAt, updatedAt]
      properties:
        id: { type: string }
        workspaceId: { type: string }
        incidentId: { type: string }
        question: { type: string }
        mode: { type: string, enum: [advisory, binding] }
        options: { type: array, items: { type: object, required: [id, label], properties: { id: { type: string }, label: { type: string } } } }
        eligibleVoterIds: { type: array, items: { type: string } }
        quorum: { type: integer }
        allowVoteChanges: { type: boolean }
        votes: { type: array, items: { type: object, required: [voterId, optionId, castAt], properties: { voterId: { type: string }, optionId: { type: string }, castAt: { type: string, format: date-time } } } }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RequestApproval:
      type: object
      required: [actionId, eligibleApproverIds, quorum]
      properties:
        actionId: { type: string }
        eligibleApproverIds: { type: array, minItems: 1, uniqueItems: true, items: { type: string } }
        quorum: { type: integer, minimum: 1 }
    Approval:
      type: object
      required: [id, workspaceId, incidentId, actionId, specificationHash, eligibleApproverIds, quorum, responses, outcome, createdBy, createdAt, updatedAt]
      properties:
        id: { type: string }
        workspaceId: { type: string }
        incidentId: { type: string }
        actionId: { type: string }
        specificationHash: { type: string, pattern: "^[0-9a-f]{64}$" }
        eligibleApproverIds: { type: array, items: { type: string } }
        quorum: { type: integer }
        responses: { type: array, items: { type: object, required: [approverId, decision, respondedAt], properties: { approverId: { type: string }, decision: { type: string, enum: [approve, reject] }, respondedAt: { type: string, format: date-time } } } }
        outcome: { type: string, enum: [pending, approved, rejected] }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreatePost:
      type: object
      required: [blocks]
      properties:
        replyToPostId: { type: string }
        replyToBlockId: { type: string }
        blocks:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/BlockInput" }
    BlockInput:
      type: object
      required: [type, payload]
      properties:
        type:
          type: string
          enum: [markdown, code, log, table, checklist, fact, decision, action, poll, approval, status]
        schemaVersion: { type: integer, minimum: 1, default: 1 }
        payload: { type: object, additionalProperties: true }
    Block:
      allOf:
        - $ref: "#/components/schemas/BlockInput"
        - type: object
          required: [id]
          properties:
            id: { type: string }
    Post:
      type: object
      required: [id, workspaceId, incidentId, authorId, revision, blocks, createdAt, updatedAt]
      properties:
        id: { type: string }
        workspaceId: { type: string }
        incidentId: { type: string }
        authorId: { type: string }
        replyToPostId: { type: string }
        replyToBlockId: { type: string }
        revision: { type: integer, minimum: 1 }
        blocks:
          type: array
          items: { $ref: "#/components/schemas/Block" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
