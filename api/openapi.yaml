openapi: 3.1.0
info:
  title: Gimme Context API
  version: 0.1.0
  description: Versioned HTTP contract for the Gimme Context platform.
servers:
  - url: /api/v1
paths:
  /:
    get:
      operationId: getService
      responses:
        "200":
          description: API service information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceInfo"
  /health/live:
    get:
      servers:
        - url: /
      operationId: getLiveness
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /health/ready:
    get:
      servers:
        - url: /
      operationId: getReadiness
      responses:
        "200":
          description: Process can serve requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: Process is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
    ServiceInfo:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
        version:
          type: string
