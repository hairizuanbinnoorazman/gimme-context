name: gimme-context

services:
  api:
    build:
      context: .
      target: api
    environment:
      PORT: "8080"
      DEMO_MODE: "true"
  worker:
    build:
      context: .
      target: worker
    depends_on:
      - api

  web:
    build:
      context: web
    environment:
      API_UPSTREAM: http://api:8080
    depends_on:
      - api
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health/live || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 10
