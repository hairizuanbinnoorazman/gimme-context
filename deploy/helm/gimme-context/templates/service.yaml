apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
spec:
  selector:
    app.kubernetes.io/name: gimme-context-api
  ports:
    - name: http
      port: {{ .Values.service.apiPort }}
      targetPort: http
  type: {{ .Values.service.type }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web
spec:
  selector:
    app.kubernetes.io/name: gimme-context-web
  ports:
    - name: http
      port: {{ .Values.service.webPort }}
      targetPort: http
  type: {{ .Values.service.type }}
